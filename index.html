<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Tap Game</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1d2671,#c33764);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  text-align:center;
  width:90%;
  max-width:400px;
}

h1{margin-bottom:10px}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:20px;
}

.btn{
  height:100px;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  cursor:pointer;
  transition:0.2s;
}

.btn:active{transform:scale(0.9)}

.red{background:#ff4d4d}
.green{background:#4caf50}
.blue{background:#2196f3}
.yellow{background:#ffeb3b; color:black}

.info{
  margin-top:15px;
}

.start{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00e676;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="container">
  <h1>🧠 Memory Tap Game</h1>
  <p>Repeat the pattern!</p>

  <div class="grid">
    <div class="btn red" onclick="userClick(0)"></div>
    <div class="btn green" onclick="userClick(1)"></div>
    <div class="btn blue" onclick="userClick(2)"></div>
    <div class="btn yellow" onclick="userClick(3)"></div>
  </div>

  <button class="start" onclick="startGame()">Start Game</button>

  <div class="info">
    <p id="level">Level: 0</p>
    <p id="status">Press Start</p>
  </div>
</div>

<script>
let sequence=[];
let userSeq=[];
let level=0;
let playing=false;

function startGame(){
  sequence=[];
  level=0;
  nextLevel();
}

function nextLevel(){
  userSeq=[];
  level++;
  document.getElementById('level').innerText="Level: "+level;
  document.getElementById('status').innerText="Watch...";

  sequence.push(Math.floor(Math.random()*4));
  playSequence();
}

function playSequence(){
  let i=0;
  let interval=setInterval(()=>{
    flash(sequence[i]);
    i++;
    if(i>=sequence.length){
      clearInterval(interval);
      document.getElementById('status').innerText="Your turn";
      playing=true;
    }
  },700);
}

function flash(index){
  const btn=document.getElementsByClassName('btn')[index];
  btn.style.opacity=0.5;
  setTimeout(()=>btn.style.opacity=1,300);
}

function userClick(index){
  if(!playing) return;

  userSeq.push(index);
  flash(index);

  if(userSeq[userSeq.length-1]!==sequence[userSeq.length-1]){
    document.getElementById('status').innerText="Game Over!";
    playing=false;
    return;
  }

  if(userSeq.length===sequence.length){
    playing=false;
    setTimeout(nextLevel,1000);
  }
}
</script>

</body>
</html>
