<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VoiceFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #10101e;
  --surface2: #18182a;
  --border: rgba(255,255,255,0.06);
  --cyan: #00f5d4;
  --cyan2: #00c4aa;
  --pink: #ff2d78;
  --text: #eeeef5;
  --muted: rgba(238,238,245,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 8s ease-in-out infinite;
}
.bg-orb1 { width: 350px; height: 350px; top: -100px; left: -80px; background: rgba(0,245,212,0.07); }
.bg-orb2 { width: 300px; height: 300px; bottom: -80px; right: -60px; background: rgba(255,45,120,0.07); animation-delay: -4s; }

@keyframes orbFloat {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(20px,20px); }
}

.app {
  position: relative; z-index: 1;
  max-width: 430px;
  margin: 0 auto;
  padding: 24px 16px 48px;
  min-height: 100vh;
}

.header { text-align: center; margin-bottom: 28px; padding-top: 12px; }

.header-tag {
  display: inline-block;
  font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--cyan);
  border: 1px solid rgba(0,245,212,0.3);
  border-radius: 999px; padding: 4px 12px; margin-bottom: 10px;
}

.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px; letter-spacing: 4px; line-height: 1;
  background: linear-gradient(135deg, #fff 30%, var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.header p { font-size: 12px; color: var(--muted); margin-top: 6px; letter-spacing: 0.5px; }

.status-bar {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 999px; margin-bottom: 20px;
}

.s-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; transition: all 0.3s; }
.s-dot.listening { background: var(--pink); box-shadow: 0 0 8px var(--pink); animation: blink 0.8s infinite; }
.s-dot.speaking { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: blink 1s infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.s-text { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.5px; }

.tabs { display: flex; gap: 8px; margin-bottom: 20px; }

.tab {
  flex: 1; padding: 12px 8px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 600; border-radius: 14px;
  cursor: pointer; transition: all 0.25s;
}

.tab.active { background: var(--cyan); color: #080810; border-color: var(--cyan); }

.panel { display: none; }
.panel.active { display: flex; flex-direction: column; gap: 16px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 20px; position: relative; overflow: hidden;
}

.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,245,212,0.25), transparent);
}

.card-title {
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--cyan); margin-bottom: 16px;
}

.mic-center { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 8px 0; }

.mic-ring { position: relative; width: 110px; height: 110px; }

.mic-ring-outer {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid rgba(0,245,212,0.15);
  animation: ringPulse 3s ease-in-out infinite;
}

@keyframes ringPulse {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.08); opacity: 1; }
}

.mic-btn {
  position: absolute; inset: 10px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--cyan), var(--cyan2));
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 32px; transition: all 0.2s;
  box-shadow: 0 8px 32px rgba(0,245,212,0.25);
}

.mic-btn:active { transform: scale(0.92); }

.mic-btn.recording {
  background: linear-gradient(135deg, var(--pink), #cc2060);
  box-shadow: 0 8px 32px rgba(255,45,120,0.35);
  animation: recPulse 1s ease-in-out infinite;
}

@keyframes recPulse {
  0%,100% { box-shadow: 0 8px 32px rgba(255,45,120,0.35); }
  50% { box-shadow: 0 8px 48px rgba(255,45,120,0.6); }
}

.mic-label { font-size: 13px; color: var(--muted); font-weight: 500; text-align: center; }
.mic-label span { display: block; font-size: 11px; margin-top: 3px; color: rgba(238,238,245,0.2); }

.wave { display: flex; align-items: center; gap: 3px; height: 30px; }

.wave-bar { width: 3px; border-radius: 3px; background: var(--cyan); height: 4px; opacity: 0.3; }

.wave-bar.active {
  opacity: 1;
  animation: waveAnim 0.7s ease-in-out infinite;
}

.wave-bar:nth-child(1) { animation-delay: 0s; }
.wave-bar:nth-child(2) { animation-delay: 0.1s; }
.wave-bar:nth-child(3) { animation-delay: 0.15s; }
.wave-bar:nth-child(4) { animation-delay: 0.2s; }
.wave-bar:nth-child(5) { animation-delay: 0.15s; }
.wave-bar:nth-child(6) { animation-delay: 0.1s; }
.wave-bar:nth-child(7) { animation-delay: 0s; }

@keyframes waveAnim {
  0%,100% { height: 4px; }
  50% { height: 24px; }
}

.transcript {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; min-height: 90px;
  font-size: 14px; line-height: 1.65; word-break: break-word;
}

.transcript .ph { color: var(--muted); font-style: italic; }
.transcript .interim { color: rgba(0,245,212,0.55); }

.meta-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.char-count { font-size: 11px; color: var(--muted); }

.btn-row { display: flex; gap: 8px; margin-top: 14px; }

.btn {
  flex: 1; padding: 12px 8px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 5px;
}

.btn:active { transform: scale(0.95); opacity: 0.7; }
.btn-cyan { background: linear-gradient(135deg, var(--cyan), var(--cyan2)); color: #080810; border-color: transparent; font-weight: 700; }
.btn-pink { background: linear-gradient(135deg, var(--pink), #cc2060); color: #fff; border-color: transparent; font-weight: 700; }

textarea.tts-area {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 14px; line-height: 1.65;
  resize: none; min-height: 110px; outline: none; transition: border-color 0.2s;
}

textarea.tts-area:focus { border-color: rgba(0,245,212,0.35); }
textarea.tts-area::placeholder { color: var(--muted); }

.speak-anim { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 0 4px; }

.speak-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); opacity: 0.2; }

.speak-dot.on { animation: dotPop 1.2s ease-in-out infinite; }
.speak-dot:nth-child(1) { animation-delay: 0s; }
.speak-dot:nth-child(2) { animation-delay: 0.2s; }
.speak-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPop {
  0%,100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.4); }
}

.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 999px; padding: 10px 22px;
  font-size: 13px; font-weight: 500; white-space: nowrap;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<div class="app">
  <div class="header">
    <div class="header-tag">AI VOICE APP</div>
    <h1>VOICEFLOW</h1>
    <p>Speech to Text · Text to Speech</p>
  </div>

  <div class="status-bar">
    <div class="s-dot" id="sDot"></div>
    <span class="s-text" id="sText">Ready</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('stt',this)">🎤 Speech → Text</button>
    <button class="tab" onclick="switchTab('tts',this)">🔊 Text → Speech</button>
  </div>

  <!-- STT -->
  <div class="panel active" id="panel-stt">
    <div class="card">
      <div class="card-title">🎙 Microphone Input</div>
      <div class="mic-center">
        <div class="mic-ring">
          <div class="mic-ring-outer"></div>
          <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        </div>
        <div class="wave" id="waveEl">
          <div class="wave-bar" id="wb1"></div>
          <div class="wave-bar" id="wb2"></div>
          <div class="wave-bar" id="wb3"></div>
          <div class="wave-bar" id="wb4"></div>
          <div class="wave-bar" id="wb5"></div>
          <div class="wave-bar" id="wb6"></div>
          <div class="wave-bar" id="wb7"></div>
        </div>
        <div class="mic-label" id="micLabel">Tap to start listening<span>Native speech engine</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📝 Transcript</div>
      <div class="transcript" id="transcriptBox">
        <span class="ph" id="ph">Your speech will appear here...</span><span id="finalTxt"></span><span class="interim" id="interimTxt"></span>
      </div>
      <div class="meta-row">
        <span class="char-count" id="charCount">0 characters</span>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="copyText()">📋 Copy</button>
        <button class="btn btn-cyan" onclick="sendToTTS()">→ TTS</button>
        <button class="btn btn-pink" onclick="clearSTT()">🗑 Clear</button>
      </div>
    </div>
  </div>

  <!-- TTS -->
  <div class="panel" id="panel-tts">
    <div class="card">
      <div class="card-title">✍️ Text Input</div>
      <textarea class="tts-area" id="ttsInput" placeholder="Type or paste text here to convert to speech..." oninput="updateTTSCount()"></textarea>
      <div class="meta-row">
        <span class="char-count" id="ttsCount">0 characters</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔊 Playback</div>
      <div class="speak-anim">
        <div class="speak-dot" id="sd1"></div>
        <div class="speak-dot" id="sd2"></div>
        <div class="speak-dot" id="sd3"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-cyan" id="speakBtn" onclick="speakText()">▶ Speak</button>
        <button class="btn btn-pink" onclick="stopSpeak()">⏹ Stop</button>
        <button class="btn" onclick="clearTTS()">🗑 Clear</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const isAI = typeof AppInventor !== 'undefined';
let recognition = null;
let isRecording = false;
let finalText = '';

// TABS
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// STT
function toggleMic() {
  if (isRecording) stopMic();
  else startMic();
}

function startMic() {
  if (isAI) {
    // Tell App Inventor to start SpeechRecognizer
    AppInventor.setWebViewString('startSTT');
    setMicUI(true);
    setStatus('listening', 'Listening...');
    return;
  }
  // Web fallback
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('❌ Not supported'); return; }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onstart = () => { setMicUI(true); setStatus('listening', 'Listening...'); };
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    renderTranscript(finalText, interim);
  };
  recognition.onerror = () => stopMic();
  recognition.onend = () => { if (isRecording) recognition.start(); };
  recognition.start();
}

function stopMic() {
  isRecording = false;
  if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
  setMicUI(false);
  setStatus('', 'Ready');
}

function setMicUI(on) {
  isRecording = on;
  document.getElementById('micBtn').classList.toggle('recording', on);
  document.getElementById('micBtn').textContent = on ? '⏹' : '🎤';
  document.getElementById('micLabel').childNodes[0].textContent = on ? 'Tap to stop' : 'Tap to start listening';
  for (let i = 1; i <= 7; i++) document.getElementById('wb'+i).classList.toggle('active', on);
}

// Called BY App Inventor after getting speech text
function setTranscript(text) {
  finalText = text + ' ';
  renderTranscript(finalText, '');
  setMicUI(false);
  setStatus('', 'Ready');
}

function renderTranscript(final, interim) {
  const total = (final + interim).trim();
  document.getElementById('ph').style.display = total ? 'none' : 'inline';
  document.getElementById('finalTxt').textContent = final;
  document.getElementById('interimTxt').textContent = interim;
  document.getElementById('charCount').textContent = total.length + ' characters';
}

function clearSTT() { stopMic(); finalText = ''; renderTranscript('',''); showToast('🗑 Cleared!'); }

function copyText() {
  const t = finalText.trim();
  if (!t) { showToast('⚠ Nothing to copy!'); return; }
  if (navigator.clipboard) navigator.clipboard.writeText(t).then(() => showToast('✓ Copied!'));
  else {
    const ta = document.createElement('textarea');
    ta.value = t; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); showToast('✓ Copied!');
  }
}

function sendToTTS() {
  const t = finalText.trim();
  if (!t) { showToast('⚠ No transcript!'); return; }
  document.getElementById('ttsInput').value = t;
  updateTTSCount();
  switchTab('tts', document.querySelectorAll('.tab')[1]);
  showToast('✓ Sent to TTS!');
}

// TTS
function speakText() {
  const text = document.getElementById('ttsInput').value.trim();
  if (!text) { showToast('⚠ Enter text first!'); return; }

  if (isAI) {
    // Tell App Inventor to speak using native TTS
    AppInventor.setWebViewString('speak:' + text);
    setSpeaking(true);
    setStatus('speaking', 'Speaking...');
    return;
  }

  if (!window.speechSynthesis) { showToast('❌ TTS not supported'); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.onstart = () => { setSpeaking(true); setStatus('speaking', 'Speaking...'); };
  utt.onend = utt.onerror = () => { setSpeaking(false); setStatus('', 'Ready'); };
  window.speechSynthesis.speak(utt);
}

function stopSpeak() {
  if (isAI) AppInventor.setWebViewString('stopTTS');
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  setSpeaking(false); setStatus('', 'Ready'); showToast('⏹ Stopped');
}

// Called BY App Inventor when TTS finishes
function onSpeakDone() { setSpeaking(false); setStatus('', 'Ready'); }

function setSpeaking(on) {
  ['sd1','sd2','sd3'].forEach(id => document.getElementById(id).classList.toggle('on', on));
  document.getElementById('speakBtn').textContent = on ? '⏸ Speaking...' : '▶ Speak';
}

function clearTTS() { document.getElementById('ttsInput').value = ''; updateTTSCount(); showToast('🗑 Cleared!'); }
function updateTTSCount() { document.getElementById('ttsCount').textContent = document.getElementById('ttsInput').value.length + ' characters'; }

function setStatus(type, text) {
  const dot = document.getElementById('sDot');
  dot.className = 's-dot' + (type ? ' '+type : '');
  document.getElementById('sText').textContent = text;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
